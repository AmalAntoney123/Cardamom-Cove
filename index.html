  <head>

    <title>The Cardamom Cove | Luxury Resort</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #faf9f6;
        color: #1a2e25;
        overflow-x: hidden;
      }
      h1, h2, h3, h4, .font-serif {
        font-family: 'Playfair Display', serif;
      }
      
      /* Luxury Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1ec;
      }
      ::-webkit-scrollbar-thumb {
        background: #2d4a3e;
      }

      /* Custom Reveal Animations */
      .reveal {
        opacity: 0;
        transform: translateY(30px);
        transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .reveal.active {
        opacity: 1;
        transform: translateY(0);
      }
      
      .reveal-scale {
        opacity: 0;
        transform: scale(0.95);
        transition: all 1.4s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .reveal-scale.active {
        opacity: 1;
        transform: scale(1);
      }

      .reveal-left {
        opacity: 0;
        transform: translateX(-40px);
        transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .reveal-left.active {
        opacity: 1;
        transform: translateX(0);
      }

      .reveal-right {
        opacity: 0;
        transform: translateX(40px);
        transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .reveal-right.active {
        opacity: 1;
        transform: translateX(0);
      }

      /* Slow Zoom Ken Burns Effect */
      .ken-burns {
        animation: kenburns 40s infinite alternate ease-in-out;
      }
      @keyframes kenburns {
        0% { transform: scale(1); }
        100% { transform: scale(1.15); }
      }

      .bg-cream { background-color: #faf9f6; }
      .text-gold { color: #c5a059; }
      .bg-gold { background-color: #c5a059; }
      .border-gold { border-color: #c5a059; }
      .bg-forest { background-color: #0f1a15; }
      .text-forest { color: #0f1a15; }
    </style>
